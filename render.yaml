services:
  - type: web
    name: aras-website
    env: node
    plan: free
    buildCommand: npm install -g pnpm@10.4.1 && pnpm install --no-frozen-lockfile && pnpm rebuild better-sqlite3 && pnpm run build && pnpm run db:push && pnpm run db:seed
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        value: file:sqlite.db
      - key: JWT_SECRET
        generateValue: true
      - key: VITE_APP_ID
        value: aras-website-app
      - key: VITE_APP_TITLE
        value: ARAS Website
      - key: OAUTH_SERVER_URL
        value: "https://aras-website.onrender.com"
      - key: OWNER_OPEN_ID
        value: "admin-aras-2025"
